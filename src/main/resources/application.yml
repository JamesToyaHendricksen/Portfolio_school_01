spring:
  application:
    name: life-shield-ai-backend
  datasource:
    url: jdbc:h2:mem:lifeshield;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  jackson:
    time-zone: Asia/Tokyo

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.example.lifeshieldai.entity
  configuration:
    map-underscore-to-camel-case: true

server:
  port: ${PORT:8080}
  servlet:
    session:
      timeout: 30m
  error:
    include-message: never

app:
  upload-dir: uploads

virustotal:
  api:
    key: ${VIRUSTOTAL_API_KEY:0053b3a72eb6a6bb1f80408bcc02235bd4d3745a744dfa3369e6641aa902be9e}

logging:
  level:
    com.example.lifeshieldai.mapper: DEBUG
