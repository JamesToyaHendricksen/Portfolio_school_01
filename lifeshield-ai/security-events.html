<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LifeShield AI の危険イベント一覧です。">
  <title>危険イベント一覧 | LifeShield AI</title>
  <link rel="stylesheet" href="../css/lifeshield-ai-lp.css">
</head>
<body>
  <a class="skip-link" href="#main-content">本文へ移動</a>
  <div class="page-shell">
    <header class="site-header" data-open="false">
      <div class="container header-inner">
        <div class="header-brand">
          <button class="brand-menu-toggle" type="button" aria-label="サイトメニューを開く" aria-expanded="false" aria-controls="site-menu-panel"><span class="brand-mark" aria-hidden="true"></span></button>
          <a class="brand-home" href="index.html" aria-label="LifeShield AI トップページ"><span class="brand-name"><strong>LifeShield AI</strong><span>個人向け AI セキュリティ</span></span></a>
        </div>
        <nav class="site-nav" aria-label="サイトメニュー">
          <div class="nav-dropdown-panel" id="site-menu-panel">
            <a href="index.html">ホーム</a>
            <a href="login.html">ログイン</a>
            <a href="admin-dashboard.html">管理ダッシュボード</a>
            <a href="email-monitoring.html">メール監視</a>
            <a href="security-events.html" aria-current="page">危険イベント一覧</a>
          </div>
        </nav>
        <div class="header-actions">
          <button class="mobile-nav-toggle" type="button" aria-label="メニューを開く" aria-expanded="false">☰</button>
          <button class="button button-secondary" type="button" data-logout>ログアウト</button>
        </div>
      </div>
    </header>

    <main id="main-content">
      <section class="section page-hero">
        <div class="container section-header">
          <span class="section-label">危険イベント</span>
          <h1>検知結果を一覧で確認する</h1>
          <p>メール監視で高リスク判定された内容も、ここに危険イベントとして表示されます。</p>
        </div>
      </section>

      <section class="section" data-require-session>
        <div class="container">
          <div class="session-banner"><p data-session-status>ログイン状態を確認しています。</p></div>
          <div class="admin-actions">
            <a class="button button-primary" href="email-monitoring.html">メール監視を実行</a>
            <a class="button button-secondary" href="admin-dashboard.html">ダッシュボードへ戻る</a>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <p class="form-status is-visible" data-events-message>危険イベントを読み込んでいます。</p>
          <div class="table-wrap">
            <table class="app-table" data-security-events-table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>検知日時</th>
                  <th>種別</th>
                  <th>危険度</th>
                  <th>状態</th>
                  <th>経路</th>
                  <th>理由</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="../js/lifeshield-site.js"></script>
</body>
</html>
